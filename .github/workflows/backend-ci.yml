name: Backend CI

on:
  # Permite ejecutarlo manualmente desde GitHub.
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "mini-proyecto/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "mini-proyecto/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend:
    # Este job levanta una base temporal, compila el proyecto y prueba endpoints reales.
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mini_proyect
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Johan123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mini_proyect"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: mini-proyecto

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # En GitHub Actions usamos el wrapper del proyecto para evitar depender de Maven global.
      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      # Instala el cliente de PostgreSQL para crear la extension y las tablas.
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      # Crea la estructura minima que el backend necesita para arrancar y responder.
      - name: Create database schema
        env:
          PGPASSWORD: Johan123
        run: |
          psql -h localhost -U postgres -d mini_proyect <<'SQL'
          CREATE EXTENSION IF NOT EXISTS pgcrypto;

          CREATE TABLE IF NOT EXISTS users (
              id_user uuid PRIMARY KEY DEFAULT gen_random_uuid(),
              name VARCHAR(100) NOT NULL,
              age INT NOT NULL,
              email VARCHAR(100) NOT NULL UNIQUE,
              created_at timestamptz NOT NULL DEFAULT now(),
              updated_at timestamptz NOT NULL DEFAULT now()
          );

          CREATE TABLE IF NOT EXISTS products (
              id_product uuid PRIMARY KEY DEFAULT gen_random_uuid(),
              name VARCHAR(100) NOT NULL,
              description TEXT,
              price DECIMAL(10,2) NOT NULL,
              created_at timestamptz NOT NULL DEFAULT now(),
              updated_at timestamptz NOT NULL DEFAULT now()
          );

          CREATE TABLE IF NOT EXISTS orders (
              id_order uuid PRIMARY KEY DEFAULT gen_random_uuid(),
              user_id uuid NOT NULL,
              product_id uuid NOT NULL,
              total DECIMAL(10,2),
              created_at timestamptz NOT NULL DEFAULT now(),
              updated_at timestamptz NOT NULL DEFAULT now(),
              CONSTRAINT fk_orders_user FOREIGN KEY (user_id) REFERENCES users(id_user),
              CONSTRAINT fk_orders_product FOREIGN KEY (product_id) REFERENCES products(id_product)
          );
          SQL

      # Compila el proyecto y corre sus tests con la base temporal de GitHub Actions.
      - name: Build and test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/mini_proyect
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: Johan123
        run: ./mvnw -B test package

      # Arranca el backend en segundo plano para probar endpoints reales.
      - name: Start backend
        env:
          SERVER_PORT: "8084"
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/mini_proyect
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: Johan123
        run: |
          java -jar target/*.jar > backend.log 2>&1 &
          echo $! > backend.pid

      # Espera a que el backend este listo y valida que el endpoint de usuarios responda.
      - name: Wait for backend
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8084/users > /tmp/users.json; then exit 0; fi
            sleep 2
          done
          cat backend.log
          exit 1

      # Prueba los endpoints principales y Swagger/OpenAPI.
      - name: Test API endpoints
        run: |
          curl -fsS http://localhost:8084/v3/api-docs > /tmp/openapi.json
          curl -fsS http://localhost:8084/users > /tmp/users.json
          curl -fsS http://localhost:8084/products > /tmp/products.json
          curl -fsS http://localhost:8084/orders > /tmp/orders.json
